<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>汉语冒险游戏</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 主界面 -->
<div id="home" class="screen active">
  <h1>🎮 汉语冒险</h1>
  <div class="btn" onclick="showMap()">开始游戏</div>
</div>

<!-- 地图 -->
<div id="map" class="screen">
  <h2>选择场景</h2>
  <div id="levelList"></div>
</div>

<!-- 游戏界面 -->
<div id="game" class="screen">
  <h3 id="levelTitle"></h3>

  <div id="xpContainer">
    XP:
    <div id="xpBar"></div>
  </div>

  <p id="question"></p>
  <div id="choices"></div>

  <p id="feedback"></p>
</div>

<script src="data.js"></script>
<script src="game.js"></script>

</body>
</html>
